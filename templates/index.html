<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Type Predictor</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111827;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #1f2937;
            padding: 30px;
            border-radius: 12px;
            width: 500px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 10px;
            border-radius: 8px;
            border: none;
            resize: none;
            margin-top: 10px;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📰 News Type Predictor</h1>

        <textarea id="newsText" placeholder="Enter news text..."></textarea>

        <button onclick="predict()">Predict</button>

        <div class="result" id="result"></div>
    </div>

    <script>
        async function predict() {
            const text = document.getElementById("newsText").value;

            const resultDiv = document.getElementById("result");

            resultDiv.innerHTML = "Predicting...";

            try {
                const response = await fetch("/predict", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        text: text
                    })
                });

                const data = await response.json();

                if (data.error) {
                    resultDiv.innerHTML = "Error: " + data.error;
                } else {
                    resultDiv.innerHTML =
                        "<strong>Prediction:</strong> " + data.prediction;
                }

            } catch (err) {
                resultDiv.innerHTML = "Request failed";
            }
        }
    </script>

</body>
</html>
